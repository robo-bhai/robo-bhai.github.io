<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hadi88 | Human Augmentation Tool</title>
    <style>
        :root {
            --bg-color: #411900;
            --accent-gold: #FFD700;
            --text-white: #FFFFFF;
            --glass: rgba(255, 215, 0, 0.1);
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-x: hidden;
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--accent-gold);
            border-radius: 15px;
            padding: 15px;
            backdrop-filter: blur(10px);
        }

        h2 { color: var(--accent-gold); margin-top: 0; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }

        /* Visual Section */
        #video-container { position: relative; width: 100%; height: 200px; background: #000; border-radius: 10px; overflow: hidden; }
        video, canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; }

        /* Controls */
        button {
            background: var(--accent-gold);
            color: #000;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        input, textarea {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--accent-gold);
            color: #fff;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .memory-item {
            border-bottom: 1px solid rgba(255,215,0,0.2);
            padding: 8px 0;
            font-size: 0.9rem;
        }

        .highlight { color: var(--accent-gold); font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>👁️ Visual Augmentation</h2>
        <div id="video-container">
            <video id="v" autoplay playsinline muted style="display:none;"></video>
            <canvas id="c"></canvas>
        </div>
        <button onclick="initCamera()">Activate Vision</button>
        <p style="font-size: 0.8rem; opacity: 0.8;">Status: Night-Vision / Contrast Filter Active</p>
    </div>

    <div class="card">
        <h2>👂 Hearing Augmentation</h2>
        <button id="audioBtn" onclick="initAudio()">Amplify Speech Frequencies</button>
        <div id="visualizer" style="height: 20px; background: #000; margin-top: 10px; width: 0%; transition: 0.1s; border-radius: 5px;"></div>
    </div>

    <div class="card">
        <h2>🧠 Memory & Listing</h2>
        <input type="text" id="memInput" placeholder="Store a memory (e.g. Shop order #402...)">
        <button onclick="saveMemory()">Commit to Memory</button>
        <input type="text" id="searchMem" oninput="searchMemory()" placeholder="Search memories..." style="margin-top: 20px;">
        <div id="memoryList"></div>
    </div>

    <script>
        // --- VISUAL ENGINE ---
        const video = document.getElementById('v');
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');

        async function initCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            video.play();
            draw();
        }

        function draw() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            
            // Apply Enhancement Filter (Visual Power)
            let frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < frame.data.length; i += 4) {
                // Increase Contrast & Brightness
                frame.data[i] = frame.data[i] * 1.3;     // Red
                frame.data[i+1] = frame.data[i+1] * 1.3; // Green
                frame.data[i+2] = frame.data[i+2] * 1.1; // Blue (Less blue to reduce eye strain)
            }
            ctx.putImageData(frame, 0, 0);
            requestAnimationFrame(draw);
        }

        // --- HEARING ENGINE ---
        let audioCtx;
        async function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioCtx.createMediaStreamSource(stream);
                
                // Biquad Filter to amplify speech (High-Pass around 1000Hz)
                const filter = audioCtx.createBiquadFilter();
                filter.type = "highshelf";
                filter.frequency.value = 1000;
                filter.gain.value = 15; 

                const analyser = audioCtx.createAnalyser();
                source.connect(filter);
                filter.connect(analyser);
                filter.connect(audioCtx.destination);

                document.getElementById('audioBtn').innerText = "Hearing Amplified";
                
                // Visual feedback for hearing
                const dataArray = new Uint8Array(analyser.frequencyBinCount);
                function updateVisualizer() {
                    analyser.getByteFrequencyData(dataArray);
                    let avg = dataArray.reduce((a,b) => a+b)/dataArray.length;
                    document.getElementById('visualizer').style.width = avg + "%";
                    document.getElementById('visualizer').style.backgroundColor = `rgb(255, ${avg + 100}, 0)`;
                    requestAnimationFrame(updateVisualizer);
                }
                updateVisualizer();
            }
        }

        // --- MEMORY ENGINE ---
        function saveMemory() {
            const input = document.getElementById('memInput');
            if(!input.value) return;
            
            let memories = JSON.parse(localStorage.getItem('hadi88_memories') || '[]');
            memories.push({ text: input.value, date: new Date().toLocaleString() });
            localStorage.setItem('hadi88_memories', JSON.stringify(memories));
            
            input.value = '';
            displayMemories(memories);
        }

        function searchMemory() {
            const query = document.getElementById('searchMem').value.toLowerCase();
            const memories = JSON.parse(localStorage.getItem('hadi88_memories') || '[]');
            const filtered = memories.filter(m => m.text.toLowerCase().includes(query));
            displayMemories(filtered);
        }

        function displayMemories(data) {
            const list = document.getElementById('memoryList');
            list.innerHTML = data.reverse().map(m => `
                <div class="memory-item">
                    <span class="highlight">[${m.date}]</span><br>${m.text}
                </div>
            `).join('');
        }

        // Initial Load
        displayMemories(JSON.parse(localStorage.getItem('hadi88_memories') || '[]'));
    </script>
</body>
</html>
